services:
  hcs-app:
    # Published image from CI (override via compose.env):
    image: ${APP_IMAGE:-ghcr.io/cappytech/hcs-app}:${APP_IMAGE_TAG:-ci-latest}
    pull_policy: always
    container_name: hcs-app
    restart: unless-stopped
    # Load environment variables from compose.env (create it from compose.env.example)
    env_file:
      - compose.env
    volumes:
      - ./uploads:/uploads
      - ./logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT}/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - hcs-net
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # certificates & CA
      - caddy_config:/config
    networks:
      - hcs-net
    depends_on:
      - hcs-app
networks:
  hcs-net:
    external: true
volumes:
  caddy_data:
  caddy_config: