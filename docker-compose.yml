services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: hcs-app-tailscale
    hostname: hcs-app
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_EXTRA_ARGS=--accept-routes
    volumes:
      - tailscale_state:/var/lib/tailscale
    restart: unless-stopped
    networks:
      - hcs-net

  hcs-app:
    # Published image from CI (override via compose.env):
    image: ${APP_IMAGE:-ghcr.io/cappytech/hcs-app}:${APP_IMAGE_TAG:-ci-latest}
    pull_policy: always
    container_name: hcs-app
    restart: unless-stopped
    # Shares Tailscale's network namespace — app traffic routes through Tailscale.
    # Caddy must proxy to 'tailscale:${PORT}' (not 'hcs-app:${PORT}').
    network_mode: service:tailscale
    # Load environment variables from compose.env (create it from compose.env.example)
    env_file:
      - compose.env
    volumes:
      - ./uploads:/uploads
      - ./logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT}/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      - tailscale

networks:
  hcs-net:
    external: true

volumes:
  tailscale_state:
