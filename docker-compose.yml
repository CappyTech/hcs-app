services:

  app:
    # Published image from CI (override via compose.env):
    image: ${APP_IMAGE:-ghcr.io/cappytech/sms}:${APP_IMAGE_TAG:-ci-latest}
    pull_policy: always
    container_name: sms-app
    restart: unless-stopped
    # Load environment variables from compose.env (create it from compose.env.example)
    env_file:
      - compose.env
    # Only set container-specific overrides here; all other variables come from env_file: compose.env
    environment:
      - SSH_TUNNEL_ENABLED=false
      - MONGO_HOST=hcs-mongo
      # Keep Node's listen port aligned with port mapping
      - PORT=${APP_PORT:-9000}
    ports:
      - "${FORWARD_PORT:-9000}:${PORT:-9000}"
    volumes:
      - ./uploads:/uploads
      - ./logs:/logs
    # Uncomment if you want live editing (not recommended for prod)
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT:-9000}/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - hcs-net

networks:
  hcs-net:
    external: true