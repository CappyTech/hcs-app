name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build (Node + Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --no-audit --no-fund || npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Security audit (prod deps; fail on high+)
        shell: bash
        run: |
          npm audit --omit=dev --audit-level=high

      - name: Optional tests (skip if undefined)
        shell: bash
        run: |
          node -e "const p=require('./package.json'); process.exit(!(p.scripts && p.scripts.test));" \
          && npm test \
          || echo "No test script defined; skipping tests."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
          tags: |
            sms/app:ci-${{ github.sha }}

      # Optional visibility without failing:
      - name: Security audit report (all deps; non-blocking)
        run: npm audit || true

      # Optional: validate compose file
      #- name: Docker Compose config check
        #run: docker compose -f docker-compose.yml config
