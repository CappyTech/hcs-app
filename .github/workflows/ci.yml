name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

      - run: npm test

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:ci-latest

      - name: Summary
        run: |
          echo "Image published to:" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:ci-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:ci-latest" >> $GITHUB_STEP_SUMMARY
