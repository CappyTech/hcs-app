name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (Node + Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --no-audit --no-fund || npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Security audit (prod deps; fail on high+)
        shell: bash
        run: |
          npm audit --omit=dev --audit-level=high

      - name: Optional tests (skip if undefined)
        shell: bash
        run: |
          node -e "const p=require('./package.json'); process.exit(!(p.scripts && p.scripts.test));" \
          && npm test \
          || echo "No test script defined; skipping tests."

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name (lowercase)
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:ci-latest

      - name: Publish image reference
        shell: bash
        run: |
          echo "Image published to:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:ci-${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:ci-latest" >> $GITHUB_STEP_SUMMARY

      # Optional visibility without failing:
      - name: Security audit report (all deps; non-blocking)
        run: npm audit || true

      # Optional: validate compose file
      #- name: Docker Compose config check
        #run: docker compose -f docker-compose.yml config
